name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Check dist/ is up to date
        run: git diff --exit-code dist/ || (echo "dist/ is outdated — run 'npm run build' and commit" && exit 1)
