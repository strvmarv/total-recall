name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run benchmark
      - name: Check dist/ is up to date
        run: git diff --exit-code dist/ || (echo "dist/ is outdated — run 'npm run build' and commit" && exit 1)

  test-bun:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"
      - run: npm ci
      - name: Verify bundled bun was downloaded (Linux/Mac)
        if: runner.os != 'Windows'
        run: test -x "$HOME/.total-recall/bun/1.2.10/bun"
      - name: Verify bundled bun was downloaded (Windows)
        if: runner.os == 'Windows'
        run: |
          if (-not (Test-Path "$env:USERPROFILE\.total-recall\bun\1.2.10\bun.exe")) {
            Write-Error "Bundled bun not found at expected path"
            exit 1
          }
        shell: pwsh
      - run: bun run test
      - run: bun run build
