name: Release

# Triggered on a git tag push (v*). Builds AOT-published binaries for four
# platforms (linux-x64, linux-arm64, osx-arm64, win-x64), stages each full
# publish tree into binaries/<rid>/, then publishes the npm tarball from
# the ubuntu publish job.
#
# Intel Mac (osx-x64) is NOT shipped — all modern Apple hardware is arm64.
# If Intel Mac support is re-added later, either use a macos-14-large
# Intel runner or cross-compile osx-x64 from macos-14 arm64.
#
# IMPORTANT: the AOT binary depends on sibling native libs (libe_sqlite3,
# libonnxruntime, vec0, models/). The matrix job stages the ENTIRE publish
# tree into binaries/<rid>/ — copying just the executable would yield a
# DllNotFoundException at runtime.
#
# .NET SDK version is pinned by /global.json at the repo root so every
# matrix leg uses the same SDK regardless of what's pre-installed on the
# runner. Currently pinned to .NET 10 (see global.json).
#
# No untrusted github.event.* fields are interpolated into run: blocks.
# npm publish authenticates via OIDC trusted publishing (id-token: write on
# the publish job) — there is no NPM_TOKEN secret to leak or revoke.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  deployments: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            artifact: total-recall-linux-x64
            exe: total-recall
          - rid: linux-arm64
            os: ubuntu-24.04-arm
            artifact: total-recall-linux-arm64
            exe: total-recall
          - rid: osx-arm64
            os: macos-14
            artifact: total-recall-osx-arm64
            exe: total-recall
          - rid: win-x64
            os: windows-latest
            artifact: total-recall-win-x64
            exe: total-recall.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install npm dependencies (provides sqlite-vec native lib)
        run: npm ci

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install clang for NativeAOT (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      # NOTE: the bge-small model is NOT fetched here. dotnet publish does not
      # copy models/ into the publish tree, so a build-leg fetch would never reach
      # the artifact. The model is fetched once in the publish job and seeded into
      # both the npm package and the per-RID release tarballs (see below).

      # The tag name drives -p:Version so the AOT binary reports the right
      # string from `total-recall --version` (CliApp.ResolveAppVersion reads
      # AssemblyInformationalVersionAttribute at runtime). Stripping the
      # leading "v" matches the SemVer convention embedded in package.json.
      # Pre-release suffixes (e.g. "0.8.0-beta.5") flow through unchanged
      # because InformationalVersion accepts SemVer 2.0 strings.
      #
      # REF_NAME is passed via env: (never interpolated directly into run:)
      # per GitHub Actions script-injection guidance.
      - name: Publish (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          RID: ${{ matrix.rid }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          dotnet publish src/TotalRecall.Host/TotalRecall.Host.csproj \
            -c Release \
            -r "$RID" \
            -p:PublishAot=true \
            -p:Version="$VERSION" \
            -p:InformationalVersion="$VERSION"

      - name: Publish (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RID: ${{ matrix.rid }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:REF_NAME -replace '^v',''
          dotnet publish src/TotalRecall.Host/TotalRecall.Host.csproj `
            -c Release `
            -r "$env:RID" `
            -p:PublishAot=true `
            -p:Version="$version" `
            -p:InformationalVersion="$version"

      - name: Stage publish tree into binaries (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          RID: ${{ matrix.rid }}
          EXE: ${{ matrix.exe }}
        run: |
          set -euo pipefail
          mkdir -p "binaries/$RID"
          cp -a "src/TotalRecall.Host/bin/Release/net8.0/$RID/publish/." "binaries/$RID/"
          # Strip debug symbols. .pdb (Windows), .dbg (Linux), and .dsym bundles
          # (macOS) are developer-only and never loaded at runtime, yet they were
          # ~half of every release tarball. Harmless when nothing matches; the
          # executable ($EXE = total-recall[.exe]) is never matched by these globs.
          # This trims BOTH the npm package and the per-RID release tarballs (both
          # derive from this staged tree) and is what keeps the bundled 133 MB bge
          # model under npm's publish payload limit (a fat tree tripped E413).
          find "binaries/$RID" -type f \( -name '*.pdb' -o -name '*.dbg' \) -delete
          find "binaries/$RID" -type d -iname '*.dsym' -prune -exec rm -rf {} +
          echo "--- staged tree ---"
          ls -la "binaries/$RID"
          test -f "binaries/$RID/$EXE"

      - name: Stage publish tree into binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RID: ${{ matrix.rid }}
          EXE: ${{ matrix.exe }}
        run: |
          $dest = "binaries/$env:RID"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Recurse -Force "src/TotalRecall.Host/bin/Release/net8.0/$env:RID/publish/*" $dest
          # Strip debug symbols (see the Unix step) — dev-only, never loaded at
          # runtime, and the bulk of the release/npm payload. The win-x64 publish
          # emits total-recall.pdb (~123 MB).
          # Use the "$dest\*" path form, not bare $dest: -Include only takes effect
          # when the path ends in a wildcard (PowerShell's documented -Include gotcha).
          Get-ChildItem -Path "$dest\*" -Recurse -File -Include *.pdb,*.dbg | Remove-Item -Force
          Get-ChildItem -Path "$dest\*" -Recurse -Directory -Filter *.dsym | Remove-Item -Recurse -Force
          Write-Host "--- staged tree ---"
          Get-ChildItem $dest
          if (-not (Test-Path "$dest/$env:EXE")) {
            throw "Expected executable $dest/$env:EXE missing after staging"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: binaries/${{ matrix.rid }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish npm package
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # No registry-url on setup-node below: when registry-url is set, setup-node
      # writes an .npmrc with a dummy _authToken (XXXXX-XXXXX-XXXXX-XXXXX), and a
      # configured token (even a bogus one) makes npm SKIP OIDC trusted publishing
      # and attempt token auth -> unauthenticated 404 on publish. With no token
      # configured, npm >= 11.5.1 performs the OIDC token exchange. The default
      # registry is registry.npmjs.org and package.json publishConfig pins
      # access:public, so the publish target is unchanged.
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      # OIDC trusted publishing requires npm >= 11.5.1; Node 20 ships npm 10.x.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      # Fetch the bge-small model so `npm pack` includes it (package.json `files`
      # lists models/, and the files allowlist overrides .gitignore at pack time).
      # This ships ONE top-level models/ copy in the npm package; the model is not
      # committed (133 MB, fetched + sha256-verified). The same fetched dir is
      # reused below to seed the per-RID release tarballs (after npm has packed,
      # so the per-RID copies do not bloat the npm package).
      - name: Fetch bge-small ONNX model
        shell: bash
        run: sh scripts/fetch-bge-small.sh

      - name: Download linux-x64 artifact
        uses: actions/download-artifact@v7
        with:
          name: total-recall-linux-x64
          path: binaries/linux-x64

      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@v7
        with:
          name: total-recall-linux-arm64
          path: binaries/linux-arm64

      - name: Download osx-arm64 artifact
        uses: actions/download-artifact@v7
        with:
          name: total-recall-osx-arm64
          path: binaries/osx-arm64

      - name: Download win-x64 artifact
        uses: actions/download-artifact@v7
        with:
          name: total-recall-win-x64
          path: binaries/win-x64

      - name: Verify all four RIDs staged
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for f in \
            binaries/linux-x64/total-recall \
            binaries/linux-arm64/total-recall \
            binaries/osx-arm64/total-recall \
            binaries/win-x64/total-recall.exe; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f" >&2
              missing=1
            else
              echo "OK: $f ($(stat -c%s "$f") bytes)"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more RIDs missing from staged binaries/ tree" >&2
            exit 1
          fi
          echo "--- full binaries/ tree ---"
          find binaries -maxdepth 2 -type f | sort

      - name: Restore executable bit on Unix binaries
        shell: bash
        run: |
          chmod +x binaries/linux-x64/total-recall
          chmod +x binaries/linux-arm64/total-recall
          chmod +x binaries/osx-arm64/total-recall

      # Regression guard for the E413 class of failure. The npm registry rejects
      # oversized publish payloads with "413 Payload Too Large" — v3.0.0 hit this
      # because debug symbols (~half the tree) plus the 133 MB bge model pushed the
      # tarball past the limit. `npm pack --dry-run` reports the exact packed size
      # WITHOUT publishing; fail here (with an actionable message) rather than
      # discovering the limit mid-publish. Reference points: v2.2.0 packed ~137 MB
      # (published fine); symbol-stripped v3.0.1 packs ~145 MB; the rejected v3.0.0
      # was ~214 MB. 180 MB sits safely between known-good and known-bad.
      - name: Guard npm package size (pre-publish)
        shell: bash
        run: |
          set -euo pipefail
          # `.size` is the COMPRESSED (gzipped) tarball — the bytes actually PUT to
          # the registry — not `.unpackedSize` (the raw file-sum, which is ~3-4x
          # larger and would false-fail this guard). stderr is NOT suppressed so a
          # failed pack surfaces in the log instead of yielding an empty SIZE.
          SIZE=$(npm pack --dry-run --json | jq '.[0].size')
          if [ -z "$SIZE" ] || [ "$SIZE" = "null" ]; then
            echo "::error::npm pack --dry-run produced no parseable tarball size — pack likely failed (see log above)." >&2
            exit 1
          fi
          LIMIT=$((180 * 1024 * 1024))
          echo "packed tarball: ${SIZE} bytes (ceiling ${LIMIT})"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "::error::npm package ($SIZE bytes) exceeds the safe publish ceiling ($LIMIT bytes). Check for debug symbols (*.pdb/*.dbg/*.dsym) in binaries/ or an oversized models/ tree before publishing." >&2
            exit 1
          fi

      - name: npm publish
        # Auth via OIDC trusted publishing — NO token. Requires the package's
        # Trusted Publisher on npmjs.com to point at this repo + workflow
        # (release.yml), id-token: write on this job (set above), and
        # npm >= 11.5.1 (installed above). --provenance is implicit under
        # trusted publishing but kept explicit below.
        #
        # Prerelease-aware dist-tag routing. If package.json version contains
        # a dash (e.g. 0.8.0-beta.1), publish under the matching dist-tag
        # (beta, rc, alpha) so "latest" is NOT clobbered. Only stable versions
        # publish to latest. No untrusted github.event.* input is read here;
        # the version string comes from the committed package.json at the
        # tagged SHA.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          case "$VERSION" in
            *-*)
              PRERELEASE_TAG="${VERSION##*-}"
              PRERELEASE_TAG="${PRERELEASE_TAG%%.*}"
              echo "Publishing $VERSION under dist-tag $PRERELEASE_TAG"
              npm publish --provenance --tag "$PRERELEASE_TAG"
              ;;
            *)
              echo "Publishing $VERSION under dist-tag latest"
              npm publish --provenance
              ;;
          esac

      - name: Create GitHub deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DEPLOY_ID=$(gh api repos/${{ github.repository }}/deployments \
            --input - \
            --jq '.id' <<PAYLOAD
          {"ref":"${{ github.sha }}","environment":"npm-publish","description":"v${VERSION} published to npm","auto_merge":false,"required_contexts":[]}
          PAYLOAD
          )
          gh api "repos/${{ github.repository }}/deployments/${DEPLOY_ID}/statuses" \
            -f state="success" \
            -f description="v${VERSION} published to npm" \
            -f environment_url="https://www.npmjs.com/package/@strvmarv/total-recall/v/${VERSION}"

      - name: Stage per-RID release assets
        shell: bash
        # The AOT binary alone is NOT runnable — it depends on sibling
        # libonnxruntime.dylib, vec0.dylib (via sqlite-vec), and any other
        # native runtime assets staged into binaries/<rid>/ by the matrix publish
        # step, plus the models/ subtree seeded just below. Uploading just the
        # executable (as 0.8.0-beta.4 did) produces a TypeInitializationException
        # at first DB open because Microsoft.ML.OnnxRuntime cannot P/Invoke
        # into the missing libonnxruntime.dylib.
        #
        # Ship the entire publish tree per RID as a compressed archive:
        #   - Unix RIDs  -> .tar.gz (preserves executable bit + symlinks)
        #   - Windows    -> .zip    (native Windows tooling)
        #
        # scripts/fetch-binary.js downloads the matching archive, extracts
        # it into binaries/<rid>/, and re-asserts the executable bit.
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # Seed each per-RID publish tree with the fetched model. dotnet publish
          # does NOT copy models/ into binaries/<rid>/, so a git-clone install
          # (whose cloned repo lacks the gitignored model) would otherwise find no
          # model anywhere. With models/ in the tarball, FindBundledModelsDir
          # resolves binaries/<rid>/models/ via walk-up from the extracted tree.
          # npm already packed above, so this does NOT bloat the npm package.
          for rid in linux-x64 linux-arm64 osx-arm64 win-x64; do
            cp -r models "binaries/$rid/models"
            test -f "binaries/$rid/models/bge-small-en-v1.5/model.onnx"
          done
          # tar -C <dir> -czf <out> . packs the contents of <dir> at the
          # archive root so extraction with `tar -xzf archive -C dest`
          # drops them straight into dest/ without a leading <rid>/ dir.
          #
          # All RIDs (including win-x64) use .tar.gz. The publish runner is
          # ubuntu-latest where `tar` is GNU tar, NOT bsdtar — GNU tar's -a
          # selects a compression program from the suffix and falls through
          # to uncompressed for .zip, producing a tar file with a misleading
          # extension. v0.8.0-beta.6's win-x64.zip was actually a POSIX tar
          # archive that broke any Windows extraction tool requiring real
          # PKZIP format. Switching the Windows leg to .tar.gz too keeps
          # one archive format and one extraction code path. Windows 10+
          # ships tar.exe (bsdtar/libarchive) which handles .tar.gz natively
          # since 1803, and scripts/fetch-binary.js calls it directly on
          # Windows installs.
          tar -C binaries/linux-x64   -czf release-assets/total-recall-linux-x64.tar.gz   .
          tar -C binaries/linux-arm64 -czf release-assets/total-recall-linux-arm64.tar.gz .
          tar -C binaries/osx-arm64   -czf release-assets/total-recall-osx-arm64.tar.gz   .
          tar -C binaries/win-x64     -czf release-assets/total-recall-win-x64.tar.gz     .
          ls -la release-assets/
          echo "--- archive contents preview ---"
          tar -tzf release-assets/total-recall-osx-arm64.tar.gz | head -20

      - name: Attach archives to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-assets/total-recall-linux-x64.tar.gz
            release-assets/total-recall-linux-arm64.tar.gz
            release-assets/total-recall-osx-arm64.tar.gz
            release-assets/total-recall-win-x64.tar.gz
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
