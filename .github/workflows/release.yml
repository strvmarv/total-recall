name: Release

# Triggered on a git tag push (v*). Builds AOT-published binaries for five
# platforms (linux-x64, linux-arm64, darwin-x64, darwin-arm64, win-x64),
# stages each full publish tree into binaries/<rid>/, then publishes the
# npm tarball from the ubuntu publish job.
#
# IMPORTANT: per Task 6.4, the AOT binary depends on sibling native libs
# (libe_sqlite3, libonnxruntime, vec0, models/). The matrix job stages the
# ENTIRE publish tree into binaries/<rid>/ — copying just the executable
# would yield a DllNotFoundException at runtime.
#
# This workflow is NOT triggered by the commit that introduces it. A
# maintainer will fire a draft tag during Plan 7 personal install
# validation. Requires the NPM_TOKEN repository secret.
#
# No untrusted github.event.* fields are interpolated into run: blocks;
# only the static matrix values and secrets.NPM_TOKEN (via env:) are used.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            artifact: total-recall-linux-x64
            exe: total-recall
          - rid: linux-arm64
            os: ubuntu-latest
            artifact: total-recall-linux-arm64
            exe: total-recall
          - rid: darwin-x64
            os: macos-13
            artifact: total-recall-darwin-x64
            exe: total-recall
          - rid: darwin-arm64
            os: macos-14
            artifact: total-recall-darwin-arm64
            exe: total-recall
          - rid: win-x64
            os: windows-latest
            artifact: total-recall-win-x64
            exe: total-recall.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout (with LFS for ONNX model files)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies (provides sqlite-vec native lib)
        run: npm ci

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install clang for NativeAOT (Linux x64)
        if: matrix.rid == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Install clang + aarch64 cross toolchain (Linux arm64)
        if: matrix.rid == 'linux-arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          sudo tee /etc/apt/sources.list.d/arm64.list >/dev/null <<'EOF'
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-security main restricted universe multiverse
          EOF
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            lld \
            zlib1g-dev \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            zlib1g-dev:arm64

      - name: Publish (Unix, linux-arm64 cross-compile)
        if: runner.os != 'Windows' && matrix.rid == 'linux-arm64'
        shell: bash
        run: |
          set -euo pipefail
          dotnet publish src/TotalRecall.Host/TotalRecall.Host.csproj \
            -c Release \
            -r linux-arm64 \
            -p:PublishAot=true \
            -p:CppCompilerAndLinker=clang \
            -p:SysRoot=/usr/aarch64-linux-gnu \
            -p:LinkerFlavor=lld \
            -p:ObjCopyName=aarch64-linux-gnu-objcopy

      - name: Publish (Unix, native)
        if: runner.os != 'Windows' && matrix.rid != 'linux-arm64'
        shell: bash
        env:
          RID: ${{ matrix.rid }}
        run: |
          set -euo pipefail
          dotnet publish src/TotalRecall.Host/TotalRecall.Host.csproj \
            -c Release \
            -r "$RID" \
            -p:PublishAot=true

      - name: Publish (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RID: ${{ matrix.rid }}
        run: |
          dotnet publish src/TotalRecall.Host/TotalRecall.Host.csproj `
            -c Release `
            -r "$env:RID" `
            -p:PublishAot=true

      - name: Stage publish tree into binaries (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          RID: ${{ matrix.rid }}
          EXE: ${{ matrix.exe }}
        run: |
          set -euo pipefail
          mkdir -p "binaries/$RID"
          cp -a "src/TotalRecall.Host/bin/Release/net8.0/$RID/publish/." "binaries/$RID/"
          echo "--- staged tree ---"
          ls -la "binaries/$RID"
          test -f "binaries/$RID/$EXE"

      - name: Stage publish tree into binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RID: ${{ matrix.rid }}
          EXE: ${{ matrix.exe }}
        run: |
          $dest = "binaries/$env:RID"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Recurse -Force "src/TotalRecall.Host/bin/Release/net8.0/$env:RID/publish/*" $dest
          Write-Host "--- staged tree ---"
          Get-ChildItem $dest
          if (-not (Test-Path "$dest/$env:EXE")) {
            throw "Expected executable $dest/$env:EXE missing after staging"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: binaries/${{ matrix.rid }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish npm package
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Download linux-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: total-recall-linux-x64
          path: binaries/linux-x64

      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: total-recall-linux-arm64
          path: binaries/linux-arm64

      - name: Download darwin-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: total-recall-darwin-x64
          path: binaries/darwin-x64

      - name: Download darwin-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: total-recall-darwin-arm64
          path: binaries/darwin-arm64

      - name: Download win-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: total-recall-win-x64
          path: binaries/win-x64

      - name: Verify all five RIDs staged
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for f in \
            binaries/linux-x64/total-recall \
            binaries/linux-arm64/total-recall \
            binaries/darwin-x64/total-recall \
            binaries/darwin-arm64/total-recall \
            binaries/win-x64/total-recall.exe; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f" >&2
              missing=1
            else
              echo "OK: $f ($(stat -c%s "$f") bytes)"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more RIDs missing from staged binaries/ tree" >&2
            exit 1
          fi
          echo "--- full binaries/ tree ---"
          find binaries -maxdepth 2 -type f | sort

      - name: Restore executable bit on Unix binaries
        shell: bash
        run: |
          chmod +x binaries/linux-x64/total-recall
          chmod +x binaries/linux-arm64/total-recall
          chmod +x binaries/darwin-x64/total-recall
          chmod +x binaries/darwin-arm64/total-recall

      - name: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # Prerelease-aware dist-tag routing. If package.json version contains
        # a dash (e.g. 0.8.0-beta.1), publish under the matching dist-tag
        # (beta, rc, alpha) so "latest" is NOT clobbered. Only stable versions
        # publish to latest. No untrusted github.event.* input is read here;
        # the version string comes from the committed package.json at the
        # tagged SHA.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          case "$VERSION" in
            *-*)
              PRERELEASE_TAG="${VERSION##*-}"
              PRERELEASE_TAG="${PRERELEASE_TAG%%.*}"
              echo "Publishing $VERSION under dist-tag $PRERELEASE_TAG"
              npm publish --tag "$PRERELEASE_TAG"
              ;;
            *)
              echo "Publishing $VERSION under dist-tag latest"
              npm publish
              ;;
          esac

      - name: Attach binaries to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            binaries/linux-x64/total-recall
            binaries/linux-arm64/total-recall
            binaries/darwin-x64/total-recall
            binaries/darwin-arm64/total-recall
            binaries/win-x64/total-recall.exe
          fail_on_unmatched_files: false
