# total-recall default configuration
# Copy to ~/.total-recall/config.toml to override

[tiers.hot]
max_entries = 50
token_budget = 4000
carry_forward_threshold = 0.7

[tiers.warm]
max_entries = 10000
retrieval_top_k = 5
similarity_threshold = 0.65
cold_decay_days = 30

[tiers.cold]
chunk_max_tokens = 512
chunk_overlap_tokens = 50
lazy_summary_threshold = 5

[compaction]
decay_half_life_hours = 168
warm_threshold = 0.3
promote_threshold = 0.7
warm_sweep_interval_days = 7

[embedding]
model = "all-MiniLM-L6-v2"
dimensions = 384

[regression]
miss_rate_delta = 0.1
latency_ratio = 2.0
min_events = 10

[search]
fts_weight = 0.3

[scope]
default = "user:local"

# --- Storage mode ---
# Controls how the plugin stores and retrieves data.
# "local"   - SQLite + ONNX embeddings, fully self-contained (default)
# "postgres" - Direct PostgreSQL/pgvector connection (see connection_string below)
# "cortex"  - Hybrid: local SQLite for user memories + remote Cortex API for
#              global knowledge. Requires [cortex] section below.
# [storage]
# mode = "local"

# --- Remote storage (optional) ---
# Uncomment to use Postgres/pgvector instead of SQLite.
# [storage]
# connection_string = "Host=localhost;Database=total_recall;Username=tr;Password=changeme"

# --- Cortex connection (required when mode = "cortex") ---
# URL: Base URL of your Total Recall Cortex instance (no trailing slash)
# PAT: Personal Access Token generated from Cortex web UI (starts with "tr_")
# Can also be set via TOTAL_RECALL_CORTEX_URL and TOTAL_RECALL_CORTEX_PAT env vars.
# [cortex]
# url = "https://cortex.example.com"
# pat = "tr_..."

# --- Remote embedding (optional) ---
# Set provider to use a remote embedder instead of the bundled ONNX model.
# provider = "local"              # "local" | "openai" | "bedrock"
# endpoint = "https://api.openai.com/v1"
# model_name = "text-embedding-3-small"
# bedrock_region = "us-east-1"
# bedrock_model = "cohere.embed-v4:0"
# api_key = ""                    # or set TOTAL_RECALL_EMBEDDING_API_KEY env var

# --- User identity (optional, Postgres only) ---
# [user]
# user_id = "alice"               # or set TOTAL_RECALL_USER_ID env var
