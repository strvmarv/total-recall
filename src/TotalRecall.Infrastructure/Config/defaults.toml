# total-recall default configuration
# Copy to ~/.total-recall/config.toml to override

[tiers.hot]
max_entries = 50
token_budget = 4000
carry_forward_threshold = 0.7
task_weight = 0.0
compaction_hint_threshold = 5
max_content_chars = 1200

[tiers.warm]
max_entries = 10000
retrieval_top_k = 5
similarity_threshold = 0.65
cold_decay_days = 30

[tiers.cold]
chunk_max_tokens = 512
chunk_overlap_tokens = 50
lazy_summary_threshold = 5

[tiers.pinned]
# Per-entry size cap for pinned content (chars). Pinned content is injected
# verbatim and never truncated, so size is enforced at the door.
max_content_chars = 500
# Pinned-directive "floor": a per-turn UserPromptSubmit hook re-asserts the
# pinned block near the live edge so directives keep being followed in long
# sessions. Re-injects when EITHER trigger trips since the last injection:
floor_enabled       = true   # set false to disable the per-turn floor
floor_every_n_turns = 6      # re-inject at least every N user turns
floor_growth_tokens = 6000   # re-inject after ~this many tokens of transcript growth
# Project-scoped pinned injection: when true, pins tagged to a project
# (git remote slug, e.g. "owner/repo") inject only in that repo; untagged
# pins are global and inject everywhere. When no repo is detected, only
# global pins inject. Set false to inject all pins everywhere.
project_scoping     = true

[compaction]
decay_half_life_hours = 168
warm_threshold = 0.3
promote_threshold = 0.7
warm_sweep_interval_days = 7
auto_demote_min_injections = 10
promote_min_access = 5

# Per-type decay half-lives (hours). Falls back to decay_half_life_hours.
# decay_half_life_correction = 720   # 30 days
# decay_half_life_preference = 336   # 14 days
# decay_half_life_surfaced = 72      # 3 days
# decay_half_life_decision = 168     # 7 days

[embedding]
model = "bge-small-en-v1.5"
dimensions = 384

[regression]
miss_rate_delta = 0.1
latency_ratio = 2.0
min_events = 10

[search]
fts_weight = 0.3

[scope]
default = "user:local"

[tool_cache]
max_entries = 200
default_ttl_seconds = 600

# --- Storage mode ---
# Controls how the plugin stores and retrieves data.
# "local"   - SQLite + ONNX embeddings, fully self-contained (default)
# "postgres" - Direct PostgreSQL/pgvector connection (see connection_string below)
# "cortex"  - Hybrid: local SQLite for user memories + remote Cortex API for
#              global knowledge. Requires [cortex] section below.
# [storage]
# mode = "local"

# --- Remote storage (optional) ---
# Uncomment to use Postgres/pgvector instead of SQLite.
# [storage]
# connection_string = "Host=localhost;Database=total_recall;Username=tr;Password=changeme"

# --- Cortex connection (required when mode = "cortex") ---
# URL: Base URL of your Total Recall Cortex instance (no trailing slash)
# PAT: Personal Access Token generated from Cortex web UI (starts with "tr_")
# Can also be set via TOTAL_RECALL_CORTEX_URL and TOTAL_RECALL_CORTEX_PAT env vars.
# [cortex]
# url = "https://cortex.example.com"
# pat = "tr_..."

# --- Remote embedding (optional) ---
# Set provider to use a remote embedder instead of the bundled ONNX model.
# provider = "local"              # "local" | "openai" | "bedrock"
# endpoint = "https://api.openai.com/v1"
# model_name = "text-embedding-3-small"
# bedrock_region = "us-east-1"
# bedrock_model = "cohere.embed-v4:0"
# api_key = ""                    # or set TOTAL_RECALL_EMBEDDING_API_KEY env var
# query_prefix = "Represent this sentence for searching relevant passages: "  # prepended to SEARCH queries only (asymmetric retrieval); omit to disable
# on_model_change = "auto"   # on a local model change: auto (default) re-embeds the DB in place; warn = run degraded; block = refuse to start

# --- User identity (optional, Postgres only) ---
# [user]
# user_id = "alice"               # or set TOTAL_RECALL_USER_ID env var

# --- Skill scan directories (optional) ---
# Additional directories to scan for skills, in addition to ~/.claude/skills/.
# Useful for non-Claude-Code hosts (e.g. Cursor) that don't have a native skills directory.
# [skills]
# extra_dirs = ["~/my-skills"]

# --- Eval grow safety (optional) ---
# `eval_grow` captures real retrieval misses as benchmark candidates. Accepting
# one appends the query (and a snippet of the surfaced content) to the committed
# benchmark corpus. Generic secrets/PII (emails, API tokens, private keys) are
# ALWAYS blocked from being accepted. Add your own internal terms (product names,
# customers, hostnames) below to block those too — matched case-insensitively as
# substrings. Blocked candidates stay pending so you can review/redact them.
# [eval.grow]
# sensitive_terms = ["acme-internal", "project-codename"]
